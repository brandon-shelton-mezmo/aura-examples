# Dynatrace Basic — Aura Agent Configuration Example
#
# Description: Minimal Dynatrace MCP integration — connects an aura agent to Dynatrace
#   for running DQL queries, exploring entities, and querying observability data.
# Provider: openai
# Features: MCP server connection (stdio), Dynatrace DQL and entity tools
#
# Usage:
#   CONFIG_PATH=examples/mcp-servers/dynatrace/dynatrace-basic.toml \
#     ~/Documents/GitHub/aura/target/release/aura-web-server
#
#   # or with Docker:
#   docker run -v $(pwd)/examples/mcp-servers/dynatrace/dynatrace-basic.toml:/app/config.toml \
#     -e OPENAI_API_KEY=$OPENAI_API_KEY \
#     -e DT_ENVIRONMENT=$DT_ENVIRONMENT \
#     -e DT_PLATFORM_TOKEN=$DT_PLATFORM_TOKEN \
#     -p 3030:3030 mezmo/aura:latest
#
# Prerequisites:
#   - OPENAI_API_KEY: OpenAI API key
#   - DT_ENVIRONMENT: Dynatrace environment URL (*.apps.dynatrace.com)
#   - DT_PLATFORM_TOKEN: Dynatrace platform token
#   - Node.js 18+ (for npx)

# --- LLM Provider ---
[llm]
provider = "openai"
model = "gpt-4o"
api_key = "{{ env.OPENAI_API_KEY }}"

# --- Agent Identity ---
[agent]
name = "dynatrace-assistant"
system_prompt = """
You are an assistant connected to Dynatrace via MCP tools.
You can run DQL queries, explore monitored entities, and query observability data.
When asked about system health or performance, use the available Dynatrace tools.
"""

# --- MCP Server: Dynatrace ---
# Connects to the Dynatrace MCP server via stdio transport using npx
[mcp.servers.dynatrace]
transport = "stdio"
cmd = ["npx"]
args = ["-y", "@dynatrace-oss/dynatrace-mcp-server@latest"]
description = "Dynatrace MCP server for DQL queries, entity exploration, and observability data"

# Environment variables passed to the MCP server process
[mcp.servers.dynatrace.env]
DT_ENVIRONMENT = "{{ env.DT_ENVIRONMENT }}"
DT_PLATFORM_TOKEN = "{{ env.DT_PLATFORM_TOKEN }}"
