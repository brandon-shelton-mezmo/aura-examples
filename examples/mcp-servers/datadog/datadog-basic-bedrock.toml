# Datadog Basic (Bedrock) — Aura Agent Configuration Example
#
# Description: Minimal Datadog MCP integration — connects an aura agent to Datadog
#   for querying logs, metrics, traces, monitors, incidents, and dashboards.
# Provider: bedrock
# Features: MCP server connection (stdio), Datadog observability tools
#
# Usage:
#   CONFIG_PATH=examples/mcp-servers/datadog/datadog-basic-bedrock.toml \
#     ~/Documents/GitHub/aura/target/release/aura-web-server
#
#   # or with Docker:
#   docker run -v $(pwd)/examples/mcp-servers/datadog/datadog-basic-bedrock.toml:/app/config.toml \
#     -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
#     -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
#     -e DATADOG_API_KEY=$DATADOG_API_KEY \
#     -e DATADOG_APP_KEY=$DATADOG_APP_KEY \
#     -p 3030:3030 mezmo/aura:latest
#
# Prerequisites:
#   - AWS credentials (via ~/.aws/credentials, environment, or IAM role)
#   - DATADOG_API_KEY: Datadog API key
#   - DATADOG_APP_KEY: Datadog Application key
#   - Node.js 18+ (for npx)

# --- LLM Provider ---
# Uses AWS Bedrock — no LLM API key needed, authenticates via AWS credentials chain
[llm]
provider = "bedrock"
model = "us.anthropic.claude-sonnet-4-20250514-v1:0"
region = "us-east-1"

# --- Agent Identity ---
# Defines the agent's name and behavior
[agent]
name = "datadog-assistant"
system_prompt = """
You are an assistant connected to Datadog via MCP tools.
You can query logs, metrics, traces, monitors, incidents, and dashboards.
When asked about system health, use the available Datadog tools to find answers.
"""

# --- MCP Server: Datadog ---
# Connects to the Datadog MCP server via stdio transport using npx
[mcp.servers.datadog]
transport = "stdio"
cmd = ["npx"]
args = ["-y", "@winor30/mcp-server-datadog"]
description = "Datadog MCP server for logs, metrics, traces, and incident management"

# Environment variables passed to the MCP server process
[mcp.servers.datadog.env]
DATADOG_API_KEY = "{{ env.DATADOG_API_KEY }}"
DATADOG_APP_KEY = "{{ env.DATADOG_APP_KEY }}"
