# docker-compose.yml — Full AWS Discovery Agent Stack
#
# Starts 4 services: Qdrant (database), AWS MCP Server, Qdrant MCP Server, and Aura (agent).
# MCP servers run in HTTP mode for reliable tool execution.
#
# Start the stack:
#   export AWS_ACCESS_KEY_ID=... AWS_SECRET_ACCESS_KEY=... AWS_REGION=us-east-1
#   docker compose up -d
#
# View aura logs:
#   docker compose logs -f aura
#
# Switch agent configs:
#   Change the volume mount path under the aura service, e.g.:
#     - ./aws-change-audit-agent.toml:/app/config.toml
#
# Stop everything:
#   docker compose down          (keeps data)
#   docker compose down -v       (deletes Qdrant data)

services:
  # --- Qdrant Database ---
  # Persistent vector storage for the knowledge base.
  # Data survives restarts via the qdrant_data named volume.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- AWS API MCP Server (via mcp-proxy for reliable connections) ---
  # mcp-proxy wraps the AWS MCP server (stdio) and exposes it as HTTP.
  # This maintains a persistent connection, avoiding per-request reconnection.
  # Provides call_aws and suggest_aws_commands tools.
  # READ_OPERATIONS_ONLY=true enforces read-only at the server level.
  aws-mcp:
    image: python:3.12-slim
    ports:
      - "8091:8091"
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_SESSION_TOKEN
      - READ_OPERATIONS_ONLY=true
    command: >
      bash -c "pip install -q mcp-proxy awslabs.aws-api-mcp-server &&
      mcp-proxy --transport streamablehttp --host 0.0.0.0 --port 8091
      -e READ_OPERATIONS_ONLY true
      -e AWS_REGION \$AWS_REGION
      -e AWS_ACCESS_KEY_ID \$AWS_ACCESS_KEY_ID
      -e AWS_SECRET_ACCESS_KEY \$AWS_SECRET_ACCESS_KEY
      -- awslabs.aws-api-mcp-server"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8091/mcp -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' -d '{\"jsonrpc\":\"2.0\",\"id\":0,\"method\":\"ping\"}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  # --- Qdrant MCP Server (HTTP mode, port 8000) ---
  # Provides qdrant-store (write) and qdrant-find (search) tools.
  # Uses built-in FastEmbed for embeddings — no OpenAI key needed.
  # Connects to the Qdrant database above.
  qdrant-mcp:
    image: python:3.12-slim
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=aws_resources
    command: >
      bash -c "pip install -q mcp-server-qdrant &&
      mcp-server-qdrant --transport streamable-http"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8000/mcp -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' -d '{\"jsonrpc\":\"2.0\",\"id\":0,\"method\":\"ping\"}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Aura Agent ---
  # The AI agent that connects to the MCP servers above.
  # Default config: discovery agent. Change the volume mount to switch agents.
  # Waits for both MCP servers to be healthy before starting.
  aura:
    image: mezmo/aura:latest
    ports:
      - "3030:3030"
    volumes:
      - ./aws-discovery-agent.toml:/app/config.toml
    environment:
      # MCP server URLs — point to the Docker service names
      - AWS_MCP_URL=http://aws-mcp:8091/mcp
      - QDRANT_MCP_URL=http://qdrant-mcp:8000/mcp
      # AWS credentials for Bedrock LLM calls
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION=${AWS_REGION:-us-east-1}
    depends_on:
      aws-mcp:
        condition: service_healthy
      qdrant-mcp:
        condition: service_healthy

# Persistent volume — Qdrant data survives container restarts.
# Use "docker compose down -v" to delete and start fresh.
volumes:
  qdrant_data:
