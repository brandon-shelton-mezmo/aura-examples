# OTEL Basic (Bedrock) — Aura Agent Configuration Example
#
# Description: Minimal OpenTelemetry MCP integration — connects an aura agent to an
#   OTEL-compatible backend (Jaeger, Tempo, or Traceloop) for querying traces and spans.
# Provider: bedrock
# Features: MCP server connection (stdio), OpenTelemetry trace tools
#
# Usage:
#   CONFIG_PATH=examples/mcp-servers/opentelemetry/otel-basic-bedrock.toml \
#     ~/Documents/GitHub/aura/target/release/aura-web-server
#
#   # or with Docker:
#   docker run -v $(pwd)/examples/mcp-servers/opentelemetry/otel-basic-bedrock.toml:/app/config.toml \
#     -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
#     -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
#     -e BACKEND_TYPE=$BACKEND_TYPE \
#     -e BACKEND_URL=$BACKEND_URL \
#     -p 3030:3030 mezmo/aura:latest
#
# Prerequisites:
#   - AWS credentials (via ~/.aws/credentials, environment, or IAM role)
#   - BACKEND_TYPE: "jaeger", "tempo", or "traceloop"
#   - BACKEND_URL: Backend URL (e.g., http://localhost:16686 for Jaeger)
#   - Python 3.10+ with uvx installed

# --- LLM Provider ---
# Uses AWS Bedrock — no LLM API key needed, authenticates via AWS credentials chain
[llm]
provider = "bedrock"
model = "us.anthropic.claude-sonnet-4-20250514-v1:0"
region = "us-east-1"

# --- Agent Identity ---
[agent]
name = "otel-assistant"
system_prompt = """
You are an assistant connected to an OpenTelemetry backend via MCP tools.
You can query distributed traces, analyze spans, and investigate service dependencies.
When asked about traces or service health, use the available OTEL tools to find answers.
"""

# --- MCP Server: OpenTelemetry (Traceloop) ---
# Connects to the OTEL MCP server via stdio transport using uvx
[mcp.servers.opentelemetry]
transport = "stdio"
cmd = ["uvx"]
args = ["opentelemetry-mcp"]
description = "OpenTelemetry MCP server for distributed trace querying and span analysis"

# Environment variables passed to the MCP server process
[mcp.servers.opentelemetry.env]
BACKEND_TYPE = "{{ env.BACKEND_TYPE }}"
BACKEND_URL = "{{ env.BACKEND_URL }}"
